name: sync infused formulae

on:
  schedule:
    - cron: "27 */3 * * *"
  workflow_dispatch:
    inputs:
      formula:
        description: "Optional formula name or comma-separated formula names to sync"
        required: false
        type: string
      dry_run:
        description: "Show planned changes without committing or pushing"
        required: false
        default: false
        type: boolean
      upstream_ref:
        description: "Homebrew/homebrew-core ref to sync from"
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: sync-infused-formulae-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORMULA_FILTER: ${{ github.event.inputs.formula || '' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
      INFUSIONS_DIR: ${{ github.workspace }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false
          echo "BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Determine upstream formula paths
        run: |
          sparse_file="$RUNNER_TEMP/homebrew-core-sparse.txt"
          args=(--infusions-root "$INFUSIONS_DIR" --list-upstream-paths)
          if [ -n "$FORMULA_FILTER" ]; then
            args+=(--formula "$FORMULA_FILTER")
          fi
          brew ruby -- Scripts/sync_infused_formulae.rb "${args[@]}" > "$sparse_file"
          echo "Sparse checkout paths:"
          if [ -s "$sparse_file" ]; then
            cat "$sparse_file"
          else
            echo "(none)"
          fi
          echo "SPARSE_FILE=$sparse_file" >> "$GITHUB_ENV"

      - name: Check out Homebrew core formulae
        run: |
          core_dir="$RUNNER_TEMP/homebrew-core"
          rm -rf "$core_dir"
          git init "$core_dir"
          git -C "$core_dir" remote add origin https://github.com/Homebrew/homebrew-core.git
          git -C "$core_dir" sparse-checkout init --no-cone
          if [ -s "$SPARSE_FILE" ]; then
            git -C "$core_dir" sparse-checkout set --no-cone --stdin < "$SPARSE_FILE"
          else
            git -C "$core_dir" sparse-checkout set --no-cone README.md
          fi
          git -C "$core_dir" fetch --depth=1 --filter=blob:none origin "$UPSTREAM_REF"
          git -C "$core_dir" checkout --detach FETCH_HEAD
          echo "UPSTREAM_DIR=$core_dir" >> "$GITHUB_ENV"

      - name: Sync infused formulae
        run: |
          args=(
            --repo-root "$GITHUB_WORKSPACE"
            --infusions-root "$INFUSIONS_DIR"
            --upstream-root "$UPSTREAM_DIR"
          )
          if [ -n "$FORMULA_FILTER" ]; then
            args+=(--formula "$FORMULA_FILTER")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          brew ruby -- Scripts/sync_infused_formulae.rb "${args[@]}"

      - name: Push commits
        if: env.DRY_RUN != 'true'
        run: |
          if [ "$(git rev-parse HEAD)" = "$BASE_SHA" ]; then
            echo "No commits to push."
            exit 0
          fi

          git fetch origin main
          if [ "$(git rev-parse refs/remotes/origin/main)" != "$BASE_SHA" ]; then
            git rebase refs/remotes/origin/main
          fi
          git push origin HEAD:main
